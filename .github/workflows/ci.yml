name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter @campusvoice/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: pnpm build

  backend:
    runs-on: ubuntu-latest
    env:
      CAMPUSVOICE_DATABASE_URL: sqlite+aiosqlite:///./ci.db
      CAMPUSVOICE_DATABASE_AUTO_CREATE: "false"
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check app tests
      - run: python -m ruff format --check app tests
      - run: python -m mypy app
      - run: python -m alembic upgrade head
      - run: python -m alembic check
      - run: python -m pytest --cov=app --cov-report=term-missing

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - run: docker compose -f docker-compose.yml -f docker-compose.gpu.yml config --quiet
      - run: docker build --file services/api/Dockerfile --tag campusvoice-api:ci .
      - run: docker build --file apps/web/Dockerfile --tag campusvoice-web:ci .
