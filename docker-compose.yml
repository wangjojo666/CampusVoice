name: campusvoice

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      args:
        INSTALL_AI: ${CAMPUSVOICE_DOCKER_INSTALL_AI:-false}
        PYTORCH_VERSION: ${CAMPUSVOICE_PYTORCH_VERSION:-2.11.0}
        PYTORCH_VARIANT: ${CAMPUSVOICE_PYTORCH_VARIANT:-cu130}
        PYTORCH_INDEX_URL: ${CAMPUSVOICE_PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cu130}
    environment:
      CAMPUSVOICE_ENV: production
      CAMPUSVOICE_DATABASE_URL: sqlite+aiosqlite:////data/campusvoice.db
      CAMPUSVOICE_DATABASE_AUTO_CREATE: "false"
      CAMPUSVOICE_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      CAMPUSVOICE_TIMEZONE: ${CAMPUSVOICE_TIMEZONE:-Asia/Shanghai}
      CAMPUSVOICE_ASR_PROVIDER: ${CAMPUSVOICE_ASR_PROVIDER:-disabled}
      CAMPUSVOICE_ASR_DEVICE: ${CAMPUSVOICE_ASR_DEVICE:-cpu}
      CAMPUSVOICE_ASR_MODEL: ${CAMPUSVOICE_ASR_MODEL:-paraformer-zh-streaming}
      CAMPUSVOICE_ASR_VAD_MODEL: ${CAMPUSVOICE_ASR_VAD_MODEL:-fsmn-vad}
      CAMPUSVOICE_ASR_PUNC_MODEL: ${CAMPUSVOICE_ASR_PUNC_MODEL:-ct-punc}
      CAMPUSVOICE_LLM_BASE_URL: ${CAMPUSVOICE_LLM_BASE_URL:-}
      CAMPUSVOICE_LLM_API_KEY: ${CAMPUSVOICE_LLM_API_KEY:-}
      CAMPUSVOICE_LLM_MODEL: ${CAMPUSVOICE_LLM_MODEL:-}
      CAMPUSVOICE_KNOWLEDGE_RETRIEVER: ${CAMPUSVOICE_KNOWLEDGE_RETRIEVER:-lexical}
      CAMPUSVOICE_EMBEDDING_MODEL: ${CAMPUSVOICE_EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      CAMPUSVOICE_EMBEDDING_DEVICE: ${CAMPUSVOICE_EMBEDDING_DEVICE:-cpu}
    ports:
      - "8000:8000"
    volumes:
      - campusvoice_data:/data
      - campusvoice_models:/models
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  campusvoice_data:
  campusvoice_models:
