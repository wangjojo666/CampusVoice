name: campusvoice

services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      args:
        INSTALL_AI: ${CAMPUSVOICE_DOCKER_INSTALL_AI:-false}
        PYTORCH_VERSION: ${CAMPUSVOICE_PYTORCH_VERSION:-2.11.0}
        PYTORCH_VARIANT: ${CAMPUSVOICE_PYTORCH_VARIANT:-cu130}
        PYTORCH_INDEX_URL: ${CAMPUSVOICE_PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cu130}
    environment:
      CAMPUSVOICE_ENV: ${CAMPUSVOICE_ENV:-development}
      CAMPUSVOICE_AUTH_MODE: ${CAMPUSVOICE_AUTH_MODE:-demo}
      CAMPUSVOICE_DEMO_USER_ID: ${CAMPUSVOICE_DEMO_USER_ID:-user_demo}
      CAMPUSVOICE_JWT_ISSUER: ${CAMPUSVOICE_JWT_ISSUER:-}
      CAMPUSVOICE_JWT_AUDIENCE: ${CAMPUSVOICE_JWT_AUDIENCE:-}
      CAMPUSVOICE_JWT_JWKS_URL: ${CAMPUSVOICE_JWT_JWKS_URL:-}
      CAMPUSVOICE_JWT_ALGORITHMS: '${CAMPUSVOICE_JWT_ALGORITHMS:-["RS256"]}'
      CAMPUSVOICE_JWT_LEEWAY_SECONDS: ${CAMPUSVOICE_JWT_LEEWAY_SECONDS:-30}
      CAMPUSVOICE_OIDC_ISSUER: ${CAMPUSVOICE_OIDC_ISSUER:-}
      CAMPUSVOICE_OIDC_CLIENT_ID: ${CAMPUSVOICE_OIDC_CLIENT_ID:-}
      CAMPUSVOICE_OIDC_CLIENT_SECRET: ${CAMPUSVOICE_OIDC_CLIENT_SECRET:-}
      CAMPUSVOICE_OIDC_REDIRECT_URI: ${CAMPUSVOICE_OIDC_REDIRECT_URI:-}
      CAMPUSVOICE_OIDC_POST_LOGIN_REDIRECT_URI: ${CAMPUSVOICE_OIDC_POST_LOGIN_REDIRECT_URI:-}
      CAMPUSVOICE_OIDC_POST_LOGOUT_REDIRECT_URI: ${CAMPUSVOICE_OIDC_POST_LOGOUT_REDIRECT_URI:-}
      CAMPUSVOICE_OIDC_SCOPES: '${CAMPUSVOICE_OIDC_SCOPES:-["openid","profile","email"]}'
      CAMPUSVOICE_OIDC_ID_TOKEN_ALGORITHMS: '${CAMPUSVOICE_OIDC_ID_TOKEN_ALGORITHMS:-["RS256"]}'
      CAMPUSVOICE_OIDC_LOGIN_TTL_SECONDS: ${CAMPUSVOICE_OIDC_LOGIN_TTL_SECONDS:-300}
      CAMPUSVOICE_OIDC_SESSION_TTL_SECONDS: ${CAMPUSVOICE_OIDC_SESSION_TTL_SECONDS:-28800}
      CAMPUSVOICE_OIDC_HTTP_TIMEOUT_SECONDS: ${CAMPUSVOICE_OIDC_HTTP_TIMEOUT_SECONDS:-10}
      CAMPUSVOICE_WEBSOCKET_TICKET_TTL_SECONDS: ${CAMPUSVOICE_WEBSOCKET_TICKET_TTL_SECONDS:-30}
      CAMPUSVOICE_CONFIRMATION_SECRET: ${CAMPUSVOICE_CONFIRMATION_SECRET:-}
      CAMPUSVOICE_CONFIRMATION_CHALLENGE_TTL_SECONDS: ${CAMPUSVOICE_CONFIRMATION_CHALLENGE_TTL_SECONDS:-120}
      CAMPUSVOICE_DATABASE_URL: ${CAMPUSVOICE_DATABASE_URL:-sqlite+aiosqlite:////data/campusvoice.db}
      CAMPUSVOICE_DATABASE_AUTO_CREATE: "false"
      CAMPUSVOICE_CORS_ORIGINS: '${CAMPUSVOICE_CORS_ORIGINS:-["http://localhost:3000","http://127.0.0.1:3000"]}'
      CAMPUSVOICE_TIMEZONE: ${CAMPUSVOICE_TIMEZONE:-Asia/Shanghai}
      CAMPUSVOICE_ASR_PROVIDER: ${CAMPUSVOICE_ASR_PROVIDER:-disabled}
      CAMPUSVOICE_ASR_DEVICE: ${CAMPUSVOICE_ASR_DEVICE:-cpu}
      CAMPUSVOICE_ASR_MODEL: ${CAMPUSVOICE_ASR_MODEL:-paraformer-zh-streaming}
      CAMPUSVOICE_ASR_VAD_MODEL: ${CAMPUSVOICE_ASR_VAD_MODEL:-fsmn-vad}
      CAMPUSVOICE_ASR_PUNC_MODEL: ${CAMPUSVOICE_ASR_PUNC_MODEL:-ct-punc}
      CAMPUSVOICE_ASR_MAX_FRAME_BYTES: ${CAMPUSVOICE_ASR_MAX_FRAME_BYTES:-131072}
      CAMPUSVOICE_ASR_MAX_CONTROL_MESSAGE_BYTES: ${CAMPUSVOICE_ASR_MAX_CONTROL_MESSAGE_BYTES:-32768}
      CAMPUSVOICE_ASR_IDLE_TIMEOUT_SECONDS: ${CAMPUSVOICE_ASR_IDLE_TIMEOUT_SECONDS:-30}
      CAMPUSVOICE_ASR_MAX_SESSION_SECONDS: ${CAMPUSVOICE_ASR_MAX_SESSION_SECONDS:-600}
      CAMPUSVOICE_ASR_MAX_AUDIO_SECONDS: ${CAMPUSVOICE_ASR_MAX_AUDIO_SECONDS:-300}
      CAMPUSVOICE_ASR_MAX_CONNECTIONS_PER_USER: ${CAMPUSVOICE_ASR_MAX_CONNECTIONS_PER_USER:-1}
      CAMPUSVOICE_ASR_QUOTA_BACKEND: ${CAMPUSVOICE_ASR_QUOTA_BACKEND:-local}
      CAMPUSVOICE_ASR_WORKER_COUNT: ${CAMPUSVOICE_ASR_WORKER_COUNT:-1}
      CAMPUSVOICE_ASR_REDIS_URL: ${CAMPUSVOICE_ASR_REDIS_URL:-}
      CAMPUSVOICE_ASR_REDIS_KEY_PREFIX: ${CAMPUSVOICE_ASR_REDIS_KEY_PREFIX:-campusvoice:asr:quota}
      CAMPUSVOICE_ASR_QUOTA_LEASE_GRACE_SECONDS: ${CAMPUSVOICE_ASR_QUOTA_LEASE_GRACE_SECONDS:-30}
      CAMPUSVOICE_STORE_RAW_AUDIO: ${CAMPUSVOICE_STORE_RAW_AUDIO:-false}
      CAMPUSVOICE_TRANSCRIPTION_RETENTION_DAYS: ${CAMPUSVOICE_TRANSCRIPTION_RETENTION_DAYS:-30}
      CAMPUSVOICE_CORRECTION_RETENTION_DAYS: ${CAMPUSVOICE_CORRECTION_RETENTION_DAYS:-30}
      CAMPUSVOICE_CONVERSATION_RETENTION_DAYS: ${CAMPUSVOICE_CONVERSATION_RETENTION_DAYS:-7}
      CAMPUSVOICE_PENDING_ACTION_RETENTION_DAYS: ${CAMPUSVOICE_PENDING_ACTION_RETENTION_DAYS:-30}
      CAMPUSVOICE_AUDIT_RETENTION_DAYS: ${CAMPUSVOICE_AUDIT_RETENTION_DAYS:-180}
      CAMPUSVOICE_PRIVACY_DELETION_CHALLENGE_TTL_SECONDS: ${CAMPUSVOICE_PRIVACY_DELETION_CHALLENGE_TTL_SECONDS:-120}
      CAMPUSVOICE_RETENTION_SCHEDULER_MAX_RETRIES: ${CAMPUSVOICE_RETENTION_SCHEDULER_MAX_RETRIES:-3}
      CAMPUSVOICE_RETENTION_SCHEDULER_RETRY_BASE_SECONDS: ${CAMPUSVOICE_RETENTION_SCHEDULER_RETRY_BASE_SECONDS:-5}
      CAMPUSVOICE_LLM_BASE_URL: ${CAMPUSVOICE_LLM_BASE_URL:-}
      CAMPUSVOICE_LLM_API_KEY: ${CAMPUSVOICE_LLM_API_KEY:-}
      CAMPUSVOICE_LLM_MODEL: ${CAMPUSVOICE_LLM_MODEL:-}
      CAMPUSVOICE_KNOWLEDGE_RETRIEVER: ${CAMPUSVOICE_KNOWLEDGE_RETRIEVER:-lexical}
      CAMPUSVOICE_EMBEDDING_MODEL: ${CAMPUSVOICE_EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      CAMPUSVOICE_EMBEDDING_DEVICE: ${CAMPUSVOICE_EMBEDDING_DEVICE:-cpu}
    ports:
      - "8000:8000"
    volumes:
      - campusvoice_data:/data
      - campusvoice_models:/models
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_AUTH_MODE: ${CAMPUSVOICE_AUTH_MODE:-demo}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  redis:
    image: redis:8.2-alpine
    profiles: ["multi-worker"]
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  campusvoice_data:
  campusvoice_models:
